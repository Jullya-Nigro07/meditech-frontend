<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/coonsultation.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

    <title>Agendar Consulta - Meditech</title>
</head>

<body>
<app-navbar></app-navbar>

<div class="main-consultation">
    <div class="wrapper">
    <div class="container-agendamento">
        <div class="boas-vindas" id="boasVindas">
            <h2>Olá <span id="nomeUsuario"></span></h2>
        </div>

        <div class="area-consulta">
            <div class="forms">
                <h1 id="tituloPagina">Agendar Consulta</h1>
                <div id="formPopup"></div>
                <form id="formConsulta">
                    <label>Especialidade</label>
                    <select id="especialidade" required>
                        <option disabled selected>Selecione uma especialidade</option>
                        <option>Clínico Geral</option>
                        <option>Cardiologista</option>
                        <option>Dermatologista</option>
                        <option>Ginecologista</option>
                        <option>Oftalmologista</option>
                        <option>Pediatra</option>
                        <option>Ortopedista</option>
                        <option>Neurologista</option>
                        <option>Endocrinologista</option>
                        <option>Psiquiatra</option>
                        <option>Dentista</option>
                    </select>

                    <label>Médico</label>
                    <select id="medico" required>
                        <option disabled selected>Selecione um médico</option>
                    </select>

                    <label>Data</label>
                    <input type="text" id="dataConsulta" placeholder="Clique para escolher a data">

                    <script>
                        flatpickr("#dataConsulta", {
                            minDate: "today",        // datas passadas ficam cinza
                            disable: [
                                function(date) {
                                    return date.getDay() === 0; // desabilita domingos
                                }
                            ],
                            dateFormat: "Y-m-d",
                            allowInput: false          // impede digitar manualmente
                        });
                    </script>

                    <label>Horário</label>
                    <select id="horario" required>
                        <option disabled selected>Selecione um horário</option>
                    </select>

                    <button id="botaoAgendar" type="submit">Agendar</button>
                </form>
            </div>

            <div class="resumo-consulta">
                <h2 class="consultas-text">Consultas</h2>
                <div id="lista-consultas"></div> <!-- já terá rolagem pelo CSS -->
            </div>
        </div>
        </div>
    </div>
</div>
<script src="/js/especialidade_medico.js"></script>
<script src="/js/navbar.js"></script>
<script src="/js/consultation.js"></script>
</body>
</html>
