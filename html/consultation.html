<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/css/register.css">
        <link rel="stylesheet" href="/css/base.css">
        <link rel="stylesheet" href="/css/layout.css">
        <title>Agendar Consulta - Meditech</title>
    </head>

    <body>
        <header>
            <nav>
                <img class="logo" src="/png/logo-meditech.png">
                <ul class="header">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="consultation.html">Marcar consulta</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Cadastrar-se</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <div class="forms">
                <h1 id="tituloPagina">Agendar Consulta</h1>
                <form>
                    <label>Especialidade</label>
                    <select id="especialidade">
                        <option disabled selected>Selecione uma especialidade</option>
                        <option>Clínico Geral</option>
                        <option>Cardiologista</option>
                        <option>Dermatologista</option>
                        <option>Ginecologista</option>
                        <option>Oftalmologista</option>
                        <option>Pediatra</option>
                        <option>Ortopedista</option>
                        <option>Neurologista</option>
                        <option>Endocrinologista</option>
                        <option>Psiquiatra</option>
                        <option>Dentista</option>
                    </select>

                    <label>Médico</label>
                    <select id="medico">
                        <option disabled selected>Selecione um médico</option>
                    </select>


                    <label>Data</label>
                    <input type="date" id="dataConsulta" placeholder="Selecione a data" required data-input>


                    <label>Horário</label>
                    <select id="horario">
                        <option disabled selected>Selecione um horário</option>
                    </select>

                    <button type="submit">Agendar</button>
                </form>
            </div>
        </main>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/js/especialidade_medico.js"></script>
    </body>
</html>
