<!DOCTYPE html>
<html lang="en">

<head>

    <title>Login - Meditech</title>

<body>
    <header>
        <div class="wrapper">
            <nav>
                <img class="logo" src="/png/logo-meditech.png">
                <ul class="header">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Cadastrar-se</a></li>

        <div class="main-login">
            <div class="wrapper">
                <div class="forms">
                    <form>
                        <h2>Login</h2>
                        <input id=emailLogin type="email" placeholder="Email" required autocomplete="email">
                        <input id="senhaLogin" type="password" placeholder="Senha" required autocomplete="current-password">
                        <button id=botaoLogin type="submit">Entrar</button>
                        <p class="link-cadastro">Não tem conta?
                            <a href="register.html">Cadastre-se</a>
                        </p>
                    </form>
                  <div class="desenho-forms">
                    <img src="/png/login.png" alt="">
                </div>
                </div>

            </div>
        </div>

</body>
  <script src="/js/login.js"></script>
