<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" rel="stylesheet">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/footer.css">
    <title>Login — MediTech</title>
</head>

<body>
    <app-navbar></app-navbar>

    <main class="login-main">

        <!-- Seção esquerda: formulário (45%) -->
        <section class="login-form-section">
            <div class="login-form-inner">

                <!-- Identidade visual -->
                <div class="auth-brand">
                    <div class="auth-brand-icon">
                        <span class="material-symbols-outlined">medical_services</span>
                    </div>
                    <span class="auth-brand-name">MediTech</span>
                </div>

                <h1 class="auth-title">Bem-vindo de volta</h1>
                <p class="auth-subtitle">Acesse sua conta para gerenciar seus agendamentos.</p>

                <!-- Formulário -->
                <form class="auth-form" novalidate>

                    <div id="formPopup" class="form-popup" role="alert" aria-live="polite"></div>

                    <div class="auth-field">
                        <label class="auth-label" for="emailLogin">E-mail</label>
                        <input id="emailLogin" class="auth-input" type="email"
                            placeholder="nome@exemplo.com" required autocomplete="email">
                    </div>

                    <div class="auth-field">
                        <div class="auth-label-row">
                            <label class="auth-label" for="senhaLogin">Senha</label>
                            <a class="login-forgot" href="#">Esqueci minha senha</a>
                        </div>
                        <input id="senhaLogin" class="auth-input" type="password"
                            placeholder="••••••••" required autocomplete="current-password">
                    </div>

                    <button id="botaoLogin" class="auth-btn" type="submit">Entrar</button>

                </form>

                <!-- Rodapé do formulário -->
                <div class="login-form-footer">
                    <div class="login-secure-badge">
                        <span class="secure-dot"></span>
                        <span class="secure-label">Autenticação Segura</span>
                    </div>
                    <p class="auth-redirect-text">
                        Ainda não tem conta?
                        <a href="/html/register.html">Criar conta</a>
                    </p>
                </div>

            </div>
        </section>

        <!-- Seção direita: imagem (55%) -->
        <section class="login-visual-section" aria-hidden="true">
            <img class="login-visual-img" src="/png/hospital.png" alt="Interior de clínica médica moderna">
            <div class="login-visual-overlay"></div>
            <blockquote class="login-visual-quote">
                "Tecnologia e cuidado integrados para uma medicina de precisão."
            </blockquote>
        </section>

    </main>

    <app-footer></app-footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/footer.js"></script>
    <script src="/js/login.js"></script>
</body>

</html>
