<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <title>Login - Meditech</title>
</head>

<body>
    <app-navbar></app-navbar>

        <div class="main-login">
            <div class="wrapper">
                <div class="forms">
                    <form>
                        <h2>Login</h2>
                        <div id="formPopup" class="form-popup" role="alert" aria-live="polite"></div>
                        <input id=emailLogin type="email" placeholder="Email" required autocomplete="email">
                        <input id="senhaLogin" type="password" placeholder="Senha" required autocomplete="current-password">
                        <button id=botaoLogin type="submit">Entrar</button>
                        <p class="link-cadastro">Não tem conta?
                            <a href="register.html">Cadastre-se</a>
                        </p>
                    </form>
                  <div class="desenho-forms">
                    <img src="/png/login.png" alt="">
                </div>
                </div>

            </div>
        </div>

</body>
    <script src="/js/navbar.js"></script>
    <script src="/js/login.js"></script>
</html>
