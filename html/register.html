<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/register.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <title>Cadastro - Meditech</title>
</head>

<body>
    <app-navbar></app-navbar>

    <div class="main-register">
            <div class="wrapper">
                        <div class="container-infos">

                <div class="forms">
                    <h1 id="tituloPagina">Realize seu Cadastro para Agendar</h1>
                    <div id="formPopup" class="form-popup" role="alert" aria-live="polite"></div>
                    <form>
                        <input id="nome" type="text" placeholder="Nome" required>
                        <input id="sobrenome" type="text" placeholder="Sobrenome" required>

                        <label>Data de nascimento</label>
                        <input id="dataNasc" type="date" required placeholder="Data Nascimento">
                        <script>
                            flatpickr("#dataNasc", {
                                dateFormat: "Y-m-d",
                                allowInput: false   // impede digitar manualmente
                            });
                        </script>

                        <label>Gênero</label>
                        
                        <select id="genero" required>
                            <option value="">Selecione</option>
                            <option value="feminino">Feminino</option>
                            <option value="masculino">Masculino</option>
                            <option value="prefiro_nao_informar">Prefiro não Informar</option>
                            <option value="outro">Outro</option>
                        </select>

                        <input id="telefone" type="tel" placeholder="Telefone" required>
                        <input id="cpf" type="text" placeholder="CPF" required>
                        <input id="email" type="email" placeholder="Email" required>
                        <input id="senha" type="password" placeholder="Senha" required>

                        <button id="botaoCadastrarUser" type="submit">Cadastrar</button>
                    <a href="login.html">Já possui cadastro? Vá para o Login</a>
                    </form>
                </div>
                <div class="hospital-png">
                <img src="/png/hospital.png" alt="Hospital" title="Hospital">
                </div>
            </div>
        </div>

    </div>
    

</body>

    <script src="/js/navbar.js"></script>
    <script src="/js/register.js"></script>
</html>
