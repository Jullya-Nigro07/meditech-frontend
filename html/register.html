<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/register.css">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/layout.css">
    <title>Cadastro - Meditech</title>
</head>

<body>
    <header>
        <nav>
            <img class="logo" src="/png/logo-meditech.png">
            <ul class="header">
                <li><a href="index.html">Home</a></li>
                <li><a href="consultation.html">Marcar consulta</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Cadastrar-se</a></li>
            </ul>
        </nav>
    </header>

    <main>
    <div class="forms">
        <h1 id="tituloPagina">Cadastro</h1>
        <form>
            <input id="nome" type="text" placeholder="Nome" required>
            <input id="sobrenome" type="text" placeholder="Sobrenome" required>

            <label>Data de nascimento</label>
            <input id="data" type="date" required>

            <label>Gênero</label>
            <select id="genero" required>
                <option value="">Selecione</option>
                <option>Feminino</option>
                <option>Masculino</option>
                <option>Prefiro não Informar</option>
                <option>Outro</option>
            </select>

            <input id="cpf" type="text" placeholder="CPF" required>
            <input id="email" type="email" placeholder="Email" required>
            <input id="senha" type="password" placeholder="Senha" required>

            <button id="botaoCadastrarUser" type="submit">Cadastrar</button>
        </form>
    </div>
    <script src="/js/register.js"></script>

    </main>

</body>

</html>
